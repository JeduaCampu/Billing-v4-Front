<div class="modal-overlay">
    <div class="modal-dialog card">

        <header class="modal-header">
            <div>
                <h2>Nueva Factura</h2>
                <p>Completa los datos para emitir un nuevo comprobante.</p>
            </div>
            <button class="btn-close" (click)="onCancel()">&times;</button>
        </header>

        <div class="modal-body">
            <form [formGroup]="invoiceForm" (ngSubmit)="onSubmit()" class="create-form">

                <h3 class="section-title">Datos Generales</h3>
                <div class="form-grid">
                    <div class="form-group">
                        <label>Serie</label>
                        <input type="text" formControlName="series" class="form-control">
                    </div>
                    <div class="form-group">
                        <label>Moneda</label>
                        <select formControlName="currency" class="form-control">
                            <option value="MXN">MXN - Peso Mexicano</option>
                            <option value="USD">USD - Dólar Estadounidense</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Forma de Pago</label>
                        <select formControlName="paymentForm" class="form-control">
                            <option value="01">01 - Efectivo</option>
                            <option value="03">03 - Transferencia electrónica</option>
                            <option value="28">28 - Tarjeta de débito</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Método de Pago</label>
                        <select formControlName="paymentMethod" class="form-control">
                            <option value="PUE">PUE - Pago en una sola exhibición</option>
                            <option value="PPD">PPD - Pago en parcialidades o diferido</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Recurrencia (Días)</label>
                        <input type="number" formControlName="recurrence" class="form-control"
                            placeholder="Ej: 9, 15, 30...">
                    </div>
                </div>

                <hr class="divider">

                <h3 class="section-title">Datos del Cliente</h3>

                <div class="form-group"
                    style="margin-bottom: 1.5rem; background-color: var(--bg-main); padding: 1rem; border-radius: var(--radius-sm); border: 1px solid var(--border-color);">
                    <label style="color: var(--primary); margin-bottom: 0.5rem; display: block;">Autocompletar desde
                        cliente existente</label>
                    <select class="form-control" (change)="onCustomerSelect($event)"
                        style="border-color: var(--primary-light);">
                        <option value="NEW">--- + Capturar Nuevo Cliente ---</option>

                        <option *ngFor="let c of customers" [value]="c.id">
                            {{ c.legalName }} ({{ c.taxId }})
                        </option>
                    </select>
                </div>

                <div formGroupName="customer">
                    <div class="form-grid">
                        <div class="form-group col-span-2">
                            <label>Razón Social</label>
                            <input type="text" formControlName="name" class="form-control">
                        </div>
                        <div class="form-group">
                            <label>RFC</label>
                            <input type="text" formControlName="rfc" class="form-control"
                                style="text-transform: uppercase;">
                        </div>

                        <div class="form-group">
                            <label>Régimen Fiscal</label>
                            <select formControlName="taxRegime" class="form-control">
                                <option value="" disabled selected>
                                    {{ rfcType ? 'Seleccione...' : 'Capture un RFC válido primero' }}
                                </option>
                                <option *ngFor="let reg of availableRegimenes" [value]="reg.key">
                                    {{ reg.key }} - {{ reg.desc }}
                                </option>
                            </select>
                        </div>

                        <div class="form-group">
                            <label>Uso CFDI</label>
                            <select formControlName="cfdiUse" class="form-control">
                                <option value="" disabled selected>
                                    {{ rfcType ? 'Seleccione...' : 'Capture un RFC válido primero' }}
                                </option>
                                <option *ngFor="let uso of availableUsos" [value]="uso.key">
                                    {{ uso.key }} - {{ uso.desc }}
                                </option>
                            </select>
                        </div>

                        <div class="form-group">
                            <label>Correo Electrónico</label>
                            <input type="email" formControlName="email" class="form-control">
                        </div>
                    </div>

                    <h4 class="subsection-title">Dirección</h4>
                    <div formGroupName="address" class="form-grid">
                        <div class="form-group col-span-2">
                            <label>Calle</label>
                            <input type="text" formControlName="street" class="form-control">
                        </div>
                        <div class="form-group">
                            <label>No. Ext</label>
                            <input type="text" formControlName="exterior" class="form-control">
                        </div>
                        <div class="form-group">
                            <label>No. Int</label>
                            <input type="text" formControlName="interior" class="form-control">
                        </div>
                        <div class="form-group">
                            <label>Colonia</label>
                            <input type="text" formControlName="neighborhood" class="form-control">
                        </div>
                        <div class="form-group">
                            <label>Código Postal</label>
                            <input type="text" formControlName="zip" class="form-control">
                        </div>
                        <div class="form-group">
                            <label>Ciudad</label>
                            <input type="text" formControlName="city" class="form-control">
                        </div>
                        <div class="form-group">
                            <label>Estado</label>
                            <input type="text" formControlName="state" class="form-control">
                        </div>
                        <div class="form-group">
                            <label>País</label>
                            <input type="text" formControlName="country" class="form-control">
                        </div>
                    </div>
                </div>

                <hr class="divider">

                <div class="section-header-flex">
                    <h3 class="section-title">Conceptos</h3>
                    <button type="button" class="btn btn-outline btn-sm" (click)="addItem()">+ Agregar Concepto</button>
                </div>

                <div formArrayName="items" class="items-container">
                    <div *ngFor="let item of items.controls; let i=index" [formGroupName]="i" class="item-row card-sub">
                        <div class="item-header">
                            <strong>Concepto #{{ i + 1 }}</strong>
                            <button type="button" *ngIf="items.length > 1" class="btn-remove"
                                (click)="removeItem(i)">Eliminar</button>
                        </div>

                        <div class="form-grid items-grid">
                            <div class="form-group col-span-2">
                                <label>Descripción</label>
                                <input type="text" formControlName="description" class="form-control">
                            </div>
                            <div class="form-group">
                                <label>Clave Prod/Serv</label>
                                <input type="text" formControlName="productKey" class="form-control">
                            </div>
                            <div class="form-group">
                                <label>Clave Unidad</label>
                                <input type="text" formControlName="unitCode" class="form-control">
                            </div>
                            <div class="form-group">
                                <label>Cantidad</label>
                                <input type="number" formControlName="quantity" class="form-control">
                            </div>
                            <div class="form-group">
                                <label>Precio Unitario</label>
                                <input type="number" formControlName="unitPrice" class="form-control">
                                <div class="error-msg"
                                    *ngIf="item.get('unitPrice')?.invalid && item.get('unitPrice')?.touched">
                                    Mínimo $0.01
                                </div>
                            </div>
                            <div class="form-group">
                                <label>Tasa IVA (Ej: 0.16)</label>
                                <input type="number" step="0.01" formControlName="iva" class="form-control">
                            </div>
                            <div class="form-group">
                                <label>Tasa ISR (Ej: 0.10)</label>
                                <input type="number" step="0.01" formControlName="isr" class="form-control">
                            </div>
                        </div>
                    </div>
                </div>

                <hr class="divider">

                <div class="form-group" style="margin-bottom: 2rem;">
                    <label>Notas de la factura</label>
                    <textarea formControlName="notes" class="form-control" rows="2"></textarea>
                </div>

                <div class="modal-footer"
                    style="display: flex; justify-content: space-between; padding-top: 1.5rem; border-top: 1px solid var(--border-color);">
                    <button type="button" class="btn btn-outline" (click)="onCancel()">Cancelar</button>

                    <div style="display: flex; gap: 1rem; align-items: center;">

                        <span *ngIf="!isDraftReviewed" style="font-size: 0.8rem; color: var(--error);">
                            *Revisa el borrador primero
                        </span>

                        <button type="button" class="btn btn-outline" [disabled]="isLoading" (click)="onPreview()">
                            1. Vista Previa
                        </button>

                        <button type="submit" class="btn btn-primary" [disabled]="isLoading || !isDraftReviewed">
                            {{ isLoading ? 'Procesando...' : '2. Emitir Factura' }}
                        </button>

                    </div>
                </div>

            </form>
        </div>
    </div>
</div>
