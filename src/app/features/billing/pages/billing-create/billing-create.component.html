<div class="modal-overlay" (click)="onCancel()">
    <div class="custom-modal" (click)="$event.stopPropagation()">

        <div class="modal-header">
            <div class="header-content">
                <h2>Nueva Factura</h2>
                <p>Completa los datos para emitir un nuevo comprobante.</p>
            </div>
            <button type="button" class="btn-close" (click)="onCancel()">✖</button>
        </div>

        <div class="modal-body">
            <form [formGroup]="invoiceForm" (ngSubmit)="onSubmit()" class="create-form">

                <h3 class="form-section-title">Datos Generales</h3>
                <div class="form-grid">
                    <div class="form-group">
                        <label>Serie</label>
                        <input type="text" formControlName="series" class="input-minimal">
                    </div>
                    <div class="form-group">
                        <label>Moneda</label>
                        <select formControlName="currency" class="input-minimal">
                            <option value="MXN">MXN - Peso Mexicano</option>
                            <option value="USD">USD - Dólar Estadounidense</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Forma de Pago</label>
                        <select formControlName="paymentForm" class="input-minimal">
                            <option value="01">01 - Efectivo</option>
                            <option value="03">03 - Transferencia electrónica</option>
                            <option value="28">28 - Tarjeta de débito</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Método de Pago</label>
                        <select formControlName="paymentMethod" class="input-minimal">
                            <option value="PUE">PUE - Pago en una sola exhibición</option>
                            <option value="PPD">PPD - Pago en parcialidades o diferido</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Recurrencia (Días)</label>
                        <input type="number" formControlName="recurrence" class="input-minimal"
                            placeholder="Ej: 9, 15, 30...">
                    </div>
                </div>

                <h3 class="form-section-title">Datos del Cliente</h3>

                <div class="customer-selector alert alert-info">
                    <div class="text-group w-100">
                        <label>Autocompletar desde cliente existente</label>
                        <select class="input-minimal" (change)="onCustomerSelect($event)">
                            <option value="NEW">--- ➕ Capturar Nuevo Cliente ---</option>
                            <option *ngFor="let c of customers" [value]="c.id">
                                {{ c.legalName }} ({{ c.taxId }})
                            </option>
                        </select>
                    </div>
                </div>

                <div formGroupName="customer">
                    <div class="form-grid">
                        <div class="form-group col-span-2">
                            <label>Razón Social</label>
                            <input type="text" formControlName="name" class="input-minimal">
                        </div>
                        <div class="form-group">
                            <label>RFC</label>
                            <input type="text" formControlName="rfc" class="input-minimal"
                                style="text-transform: uppercase;">
                        </div>

                        <div class="form-group">
                            <label>Régimen Fiscal</label>
                            <select formControlName="taxRegime" class="input-minimal">
                                <option value="" disabled selected>
                                    {{ rfcType ? 'Seleccione...' : 'Capture un RFC válido primero' }}
                                </option>
                                <option *ngFor="let reg of availableRegimenes" [value]="reg.key">
                                    {{ reg.key }} - {{ reg.desc }}
                                </option>
                            </select>
                        </div>

                        <div class="form-group">
                            <label>Uso CFDI</label>
                            <select formControlName="cfdiUse" class="input-minimal">
                                <option value="" disabled selected>
                                    {{ rfcType ? 'Seleccione...' : 'Capture un RFC válido primero' }}
                                </option>
                                <option *ngFor="let uso of availableUsos" [value]="uso.key">
                                    {{ uso.key }} - {{ uso.desc }}
                                </option>
                            </select>
                        </div>

                        <div class="form-group">
                            <label>Correo Electrónico</label>
                            <input type="email" formControlName="email" class="input-minimal">
                        </div>
                    </div>

                    <h4 class="subsection-title">Dirección</h4>
                    <div formGroupName="address" class="form-grid">
                        <div class="form-group col-span-2">
                            <label>Calle</label>
                            <input type="text" formControlName="street" class="input-minimal">
                        </div>
                        <div class="form-group">
                            <label>No. Ext</label>
                            <input type="text" formControlName="exterior" class="input-minimal">
                        </div>
                        <div class="form-group">
                            <label>No. Int</label>
                            <input type="text" formControlName="interior" class="input-minimal">
                        </div>
                        <div class="form-group">
                            <label>Colonia</label>
                            <input type="text" formControlName="neighborhood" class="input-minimal">
                        </div>
                        <div class="form-group">
                            <label>Código Postal</label>
                            <input type="text" formControlName="zip" class="input-minimal">
                        </div>
                        <div class="form-group">
                            <label>Ciudad</label>
                            <input type="text" formControlName="city" class="input-minimal">
                        </div>
                        <div class="form-group">
                            <label>Estado</label>
                            <input type="text" formControlName="state" class="input-minimal">
                        </div>
                        <div class="form-group">
                            <label>País</label>
                            <input type="text" formControlName="country" class="input-minimal">
                        </div>
                    </div>
                </div>

                <div class="section-header-flex">
                    <h3 class="form-section-title">Conceptos</h3>
                    <button type="button" class="btn btn-outline btn-sm" (click)="addItem()">
                        <span class="icon">➕</span> Agregar Concepto
                    </button>
                </div>

                <div formArrayName="items" class="items-container">
                    <div *ngFor="let item of items.controls; let i=index" [formGroupName]="i" class="item-row">
                        <div class="item-header">
                            <strong>Concepto #{{ i + 1 }}</strong>
                            <button type="button" *ngIf="items.length > 1" class="btn-remove" (click)="removeItem(i)">
                                <span class="icon">🗑️</span> Eliminar
                            </button>
                        </div>

                        <div class="form-grid items-grid">
                            <div class="form-group col-span-2">
                                <label>Descripción</label>
                                <input type="text" formControlName="description" class="input-minimal">
                            </div>
                            <div class="form-group">
                                <label>Clave Prod/Serv</label>
                                <input type="text" formControlName="productKey" class="input-minimal">
                            </div>
                            <div class="form-group">
                                <label>Clave Unidad</label>
                                <input type="text" formControlName="unitCode" class="input-minimal">
                            </div>
                            <div class="form-group">
                                <label>Cantidad</label>
                                <input type="number" formControlName="quantity" class="input-minimal">
                            </div>
                            <div class="form-group">
                                <label>Precio Unitario</label>
                                <input type="number" formControlName="unitPrice" class="input-minimal">
                                <div class="error-msg"
                                    *ngIf="item.get('unitPrice')?.invalid && item.get('unitPrice')?.touched">
                                    Mínimo $0.01
                                </div>
                            </div>
                            <div class="form-group">
                                <label>Tasa IVA (Ej: 0.16)</label>
                                <input type="number" step="0.01" formControlName="iva" class="input-minimal">
                            </div>
                            <div class="form-group">
                                <label>Tasa ISR (Ej: 0.10)</label>
                                <input type="number" step="0.01" formControlName="isr" class="input-minimal">
                            </div>
                        </div>
                    </div>
                </div>

                <div class="form-group mt-3">
                    <label>Notas de la factura</label>
                    <textarea formControlName="notes" class="input-minimal" rows="2"></textarea>
                </div>

                <div class="modal-footer">
                    <button type="button" class="btn-cancel" (click)="onCancel()">Cancelar</button>

                    <div class="d-flex align-items-center gap-2">

                        <span *ngIf="!isDraftReviewed" class="text-danger">
                            <small>⚠️ Revisa el borrador primero</small>
                        </span>

                        <button type="button" class="btn btn-outline" [disabled]="isLoading" (click)="onPreview()">
                            <span class="icon">👁️</span> Vista Previa
                        </button>

                        <button type="submit" class="btn-save" [disabled]="isLoading || !isDraftReviewed">
                            <span class="icon">📄</span> {{ isLoading ? 'Procesando...' : 'Emitir Factura' }}
                        </button>

                    </div>
                </div>

            </form>
        </div>
    </div>
</div>
